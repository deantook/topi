# 生产部署 - 服务器上需创建 .env 配置 DB_DSN 等
# 域名: www.lulumia.com (证书见 pem/)
services:
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/servers:/etc/nginx/servers:ro
      - ./pem:/etc/nginx/pem:ro
    depends_on:
      - topi-web
      - topi-api

  topi-api:
    image: topi-api:latest
    restart: unless-stopped
    env_file: .env
    environment:
      - PORT=8080
      - GIN_MODE=release

  topi-web:
    image: topi-web:latest
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      - topi-api
