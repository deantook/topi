# Topi 反向代理：前端 + API，HTTPS
# 域名: www.lulumia.com (证书: pem/www.lulumia.com.pem, pem/www.lulumia.com.key)
# 可选: *.lulumia.fun (证书: pem/_.lulumia.fun.pem, pem/_.lulumia.fun.key)

events {
    worker_connections 1024;
}

http {
    # 上游服务
    upstream topi_web {
        server topi-web:3000;
    }
    upstream topi_api {
        server topi-api:8080;
    }

    # HTTPS - www.lulumia.com
    server {
        listen 443 ssl http2;
        server_name www.lulumia.com;

        ssl_certificate     /etc/nginx/pem/www.lulumia.com.pem;
        ssl_certificate_key /etc/nginx/pem/www.lulumia.com.key;
        ssl_session_timeout 1d;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

        location /api/ {
            proxy_pass http://topi_api/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://topi_web/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # 可选: *.lulumia.fun
    server {
        listen 443 ssl http2;
        server_name *.lulumia.fun lulumia.fun;

        ssl_certificate     /etc/nginx/pem/_.lulumia.fun.pem;
        ssl_certificate_key /etc/nginx/pem/_.lulumia.fun.key;
        ssl_session_timeout 1d;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

        location /api/ {
            proxy_pass http://topi_api/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://topi_web/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # HTTP 重定向到 HTTPS
    server {
        listen 80;
        server_name www.lulumia.com *.lulumia.fun lulumia.fun;
        return 301 https://$host$request_uri;
    }
}
