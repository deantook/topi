# Topi 反向代理：前端 + API，HTTPS
# 启用域名见 deploy/servers/*.conf（.conf.disabled 需改名为 .conf 并添加证书后启用）

events {
    worker_connections 1024;
}

http {
    upstream topi_web {
        server topi-web:3000;
    }
    upstream topi_api {
        server topi-api:8080;
    }

    # 443: *.lulumia.fun（主配置，确保 /api /mcp 优先）
    server {
        listen 443 ssl;
        http2 on;
        server_name *.lulumia.fun lulumia.fun;

        ssl_certificate     /etc/nginx/pem/_.lulumia.fun.pem;
        ssl_certificate_key /etc/nginx/pem/_.lulumia.fun.key;
        ssl_session_timeout 1d;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

        location /api/ {
            proxy_pass http://topi_api/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /mcp {
            proxy_pass http://topi_api/mcp;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        location / {
            proxy_pass http://topi_web/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    include /etc/nginx/servers/*.conf;

    # HTTP 重定向到 HTTPS
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }
}
